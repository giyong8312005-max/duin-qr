<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>두인경매 - 오늘의 경매물건</title>
  <style>
    :root {
      --sky:       #0ea5e9;
      --sky-light: #e0f2fe;
      --sky-soft:  #f0f9ff;
      --white:     #ffffff;
      --text:      #0f172a;
      --sub:       #64748b;
      --border:    #e2e8f0;
      --red:       #e8310b;
      --radius:    14px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                   'Noto Sans KR', '맑은 고딕', sans-serif;
      background: #ffffff;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── 상단 히어로 (법원명 · 날짜 · 쿠폰) ── */
    #pageHero {
      display: none;
      background: #ffffff;
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .hero-logo {
      flex-shrink: 0;
      height: 36px;
      display: block;
    }

    .hero-logo img {
      height: 36px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .top-bar-link {
      font-size: 12px;
      color: var(--sky);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 6px 10px;
      background: var(--white);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .hero-court {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      word-break: keep-all;
    }

    .hero-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      color: var(--sky);
      font-size: 14px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #7dd3fc;
      box-shadow: 0 1px 3px rgba(14,165,233,0.12);
      margin-bottom: 14px;
    }

    .hero-date .dot {
      width: 6px; height: 6px;
      background: var(--sky);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ── 쿠폰 배너 ── */
    #couponBanner {
      display: none;
      margin-top: 4px;
    }

    .coupon-link {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--white);
      border: 2px solid var(--sky);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 14px rgba(14,165,233,0.18);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .coupon-link:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(14,165,233,0.12);
    }

    .coupon-icon {
      width: 44px; height: 44px;
      background: var(--sky-light);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .coupon-text { flex: 1; min-width: 0; }
    .coupon-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
    }
    .coupon-desc {
      font-size: 12px;
      color: var(--sub);
    }

    .coupon-btn {
      flex-shrink: 0;
      background: var(--sky);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .coupon-link.registered {
      border-color: #86efac;
      background: #f0fdf4;
      box-shadow: 0 4px 14px rgba(34,197,94,0.12);
    }
    .coupon-link.registered .coupon-icon { background: #dcfce7; }
    .coupon-code-display {
      font-size: 15px;
      font-weight: 800;
      color: #059669;
      letter-spacing: 0.02em;
    }

    /* ── 쿠폰 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal-sheet {
      background: #fff;
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      max-height: 92vh;
      overflow-y: auto;
    }

    .modal-icon {
      width: 52px; height: 52px;
      background: var(--sky-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 14px;
    }

    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .modal-desc { font-size: 14px; color: var(--sub); margin-bottom: 20px; line-height: 1.5; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .form-group label .req { color: #e8310b; }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }

    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 18px;
      line-height: 1.45;
    }
    .consent-row input { margin-top: 3px; flex-shrink: 0; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--sky);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-error {

      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .form-error.show { display: block; }

    .coupon-success {
      display: none;

      max-width: 520px;
      margin: 0 auto;

      padding: 48px 16px;

    .loading-text { font-size: 14px; color: var(--sub); }

    /* ── 통계 ── */

      padding: 14px 0 8px;

    .map-btn {

      font-weight: 600;

      font-weight: 700;

      line-height: 1.45;
      margin-bottom: 6px;

      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-area {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .item-spl {
      font-size: 12px;
      font-weight: 600;
      color: #ea580c;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .item-prices {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .price-block {
      flex: 1;
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .price-label { font-size: 11px; color: var(--sub); margin-bottom: 3px; }
    .price-val   { font-size: 15px; font-weight: 800; color: var(--text); }
    .price-val.highlight { color: var(--sky); }

    .item-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .bid-time { font-size: 12px; color: var(--sub); }
    .bid-time strong { color: var(--text); font-weight: 700; }

    .view-more {
      font-size: 12px;
      color: var(--sky);
      font-weight: 600;
    }

    /* ── 상태 화면 공통 ── */
    .state-panel {
      display: none;
      text-align: center;
      padding: 48px 20px;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-top: 16px;
    }

    .state-icon { font-size: 44px; margin-bottom: 12px; }
    .state-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    .state-desc {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    #errorView .state-title { color: var(--red); }
    #noParamView .state-title { color: var(--red); }

    .btn-primary {
      display: inline-block;
      padding: 13px 24px;
      background: var(--sky);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
    }

    /* ── 더보기 ── */
    #loadMore {
      display: none;
      width: 100%;
      margin: 4px 0 20px;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--sub);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #loadMore:active { background: var(--sky-light); color: var(--sky); }
  </style>

<script>
/* ═══════════════════════════════
   초기화
═══════════════════════════════ */
const DAYS = ['일','월','화','수','목','금','토'];
const now  = new Date();
const yyyy = now.getFullYear();
const mm   = String(now.getMonth()+1).padStart(2,'0');
const dd   = String(now.getDate()).padStart(2,'0');
const dayK = DAYS[now.getDay()];
const TODAY_LABEL = `${yyyy}년 ${Number(mm)}월 ${Number(dd)}일 (${dayK})`;
const TODAY_ISO   = `${yyyy}-${mm}-${dd}`;

document.getElementById('headerDate').textContent = TODAY_LABEL;

const sp = new URLSearchParams(window.location.search);
const courtCode = sp.get('c');
const deptCode  = sp.get('d');
const nameRaw   = sp.get('n');
const courtLabel = nameRaw ? decodeURIComponent(nameRaw) : '법원 경매물건';

function setupCouponBanner() {
  const wrap = document.getElementById('couponBanner');
  if (!COUPON_CFG.show) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  renderCouponBanner();
}

function hasCouponAccess() {
  try {
    const raw = localStorage.getItem(ACCESS_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.couponCode || !data.expiresAt) return false;
    return new Date(data.expiresAt) > new Date();
  } catch (_) {
    return false;
  }
}

function getCouponAccess() {
  try {
    const raw = localStorage.getItem(ACCESS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function saveCouponAccess(access) {
  localStorage.setItem(ACCESS_KEY, JSON.stringify(access));
}

function buildLocalCouponAccess(phone, couponCode) {
  const days = window.DUIN_CONFIG.COUPON_ACCESS_DAYS || 30;
  const now = Date.now();
  const normalized = normalizePhoneInput(phone);
  const masked = normalized.length >= 8
    ? normalized.slice(0, 3) + '****' + normalized.slice(-4)
    : normalized;
  return {
    couponCode: couponCode,
    phoneMasked: masked,
    registeredAt: new Date(now).toISOString(),
    expiresAt: new Date(now + days * 86400000).toISOString(),
    localOnly: true,
  };
}

function normalizePhoneInput(val) {
  let d = String(val || '').replace(/[^0-9]/g, '');
  if (d.startsWith('82') && d.length >= 11) {
    d = '0' + d.slice(2);
  }
  if (d.length === 10 && d.startsWith('10')) {
    d = '0' + d;
  }
  return d;
}

function isValidKrMobile(phone) {
  return /^01[016789]\d{7,8}$/.test(phone);
}

function renderCouponBanner() {
  const wrap = document.getElementById('couponBanner');
  const registered = hasCouponAccess();

  if (registered) {
    wrap.innerHTML =
      '<div class="coupon-link registered" id="couponBannerDone">' +
        '<div class="coupon-icon">✓</div>' +
        '<div class="coupon-text">' +
          '<div class="coupon-title">' + esc(COUPON_CFG.successTitle || '쿠폰 적용 완료') + '</div>' +
        '</div>' +
      '</div>';
  } else {
    const descHtml = COUPON_CFG.desc
      ? '<div class="coupon-desc">' + esc(COUPON_CFG.desc) + '</div>'
      : '';
    wrap.innerHTML =
      '<div class="coupon-link" role="button" tabindex="0" id="couponBannerBtn">' +
        '<div class="coupon-icon">🎁</div>' +
        '<div class="coupon-text">' +
          '<div class="coupon-title">' + esc(COUPON_CFG.title || '쿠폰 다운받기') + '</div>' +
          descHtml +
        '</div>' +
        '<span class="coupon-btn">' + esc(COUPON_CFG.btnText || '받기 →') + '</span>' +
      '</div>';
    document.getElementById('couponBannerBtn').addEventListener('click', openCouponModal);
    document.getElementById('couponBannerBtn').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCouponModal(); }
    });
  }
}

function setModalDesc(text) {
  const el = document.getElementById('modalDesc');
  const t = String(text || '').trim();
  el.textContent = t;
  el.style.display = t ? 'block' : 'none';
}

function openCouponModal() {
  if (hasCouponAccess()) {
    showCouponSuccess('이미 적용된 쿠폰입니다.');
    return;
  }
  document.getElementById('couponFormWrap').classList.remove('hidden');
  document.getElementById('couponSuccess').classList.remove('show');
  document.getElementById('formError').classList.remove('show');
  document.getElementById('couponForm').reset();
  document.getElementById('modalTitle').textContent = '쿠폰 다운받기';
  setModalDesc(COUPON_CFG.modalDesc);
  document.getElementById('couponModal').classList.add('show');
}

function closeCouponModal() {
  document.getElementById('couponModal').classList.remove('show');
  renderCouponBanner();
}

function showCouponSuccess(msg) {
  document.getElementById('couponFormWrap').classList.add('hidden');
  document.getElementById('couponSuccess').classList.add('show');
  document.getElementById('successTitle').textContent =
    COUPON_CFG.successTitle || '쿠폰 적용 완료';
  document.getElementById('successMsg').textContent = msg || (COUPON_CFG.successMsg ||
    '물건을 선택해 주세요.');
  document.getElementById('modalTitle').textContent = COUPON_CFG.successTitle || '쿠폰 적용 완료';
  setModalDesc('');
  document.getElementById('couponModal').classList.add('show');
}

document.getElementById('couponForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errEl = document.getElementById('formError');
  const btn   = document.getElementById('btnSubmit');
  errEl.classList.remove('show');

  const phoneRaw  = document.getElementById('inputPhone').value.trim();
  const phone     = normalizePhoneInput(phoneRaw);
  const consent = document.getElementById('inputConsent').checked;
  const couponCode = COUPON_CFG.code || 'DUIN-QR2026';

  if (!phoneRaw || !consent) {
    errEl.textContent = '휴대폰 번호와 동의 항목을 확인해 주세요.';
    errEl.classList.add('show');
    return;
  }

  if (!isValidKrMobile(phone)) {
    errEl.textContent = '올바른 휴대폰 번호를 입력해 주세요. (예: 01012345678)';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = '처리 중...';

  try {
    let apiUrl = WORKER_URL.replace(/\/$/, '') + '/?action=coupon';
    if (courtCode) {
      apiUrl += '&c=' + encodeURIComponent(courtCode);
    }
    console.log('[쿠폰] 요청 phone=' + phone.slice(0, 3) + '****' + phone.slice(-4));
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'coupon',
        phone,
        consent,
        couponCode,
        courtCode: courtCode || '',
        courtName: courtLabel || '',
      }),
    });
    const json = await resp.json();
    if (!resp.ok || !json.ok) {
      if (json.error && json.error.indexOf('법원코드') >= 0) {
        console.warn('[쿠폰] 구버전 Worker — 로컬 쿠폰 발급 (Worker 재배포 필요)');
        saveCouponAccess(buildLocalCouponAccess(phone, couponCode));
        showCouponSuccess('물건을 선택해 주세요.\n(Worker 미배포: DB 저장은 재배포 후 가능)');
        return;
      }
      if (json.error && json.error.indexOf('휴대폰') >= 0 && isValidKrMobile(phone)) {
        console.warn('[쿠폰] Worker 휴대폰 검증 오류 — 로컬 쿠폰 발급:', phone);
        saveCouponAccess(buildLocalCouponAccess(phone, couponCode));
        showCouponSuccess('물건을 선택해 주세요.\n(Worker 재배포 후 DB 저장 가능)');
        return;
      }
      throw new Error(json.error || '쿠폰 발급에 실패했습니다.');
    }

    saveCouponAccess(json.access);
    const msg = json.isNew === false
      ? (json.message || '이미 등록된 번호입니다.')
      : (COUPON_CFG.successMsg || '물건을 선택해 주세요.');
    showCouponSuccess(msg);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = '쿠폰 받기';
  }
});

document.getElementById('btnCloseModal').addEventListener('click', closeCouponModal);

document.getElementById('couponModal').addEventListener('click', function(e) {
  if (e.target === this) closeCouponModal();
});

function showHero(label) {
  document.getElementById('headerName').textContent = label;
  document.getElementById('pageHero').style.display = 'block';
  setupCouponBanner();
}

if (!courtCode) {
  console.warn('[두인경매] URL 파라미터 없음. 안내 화면 표시.');
  show('noParamView');
} else {
  const label = courtLabel;
  showHero(label);
  document.title = label + ' · 오늘의 경매물건';
  showFlex('loadingView');
  init(label);
}

/* ═══════════════════════════════
   메인 흐름
═══════════════════════════════ */
let allItems  = [];
let displayed = 0;
const PAGE_SIZE = 20;

async function init(label) {
  if (!WORKER_URL) {
    console.error('[두인경매] WORKER_URL이 비어 있습니다. config.js를 확인해 주세요.');
    hide('loadingView');
    show('errorView');
    document.getElementById('errTitle').textContent = 'Worker 설정이 필요합니다';
    document.getElementById('errDesc').innerHTML =
      'Cloudflare Worker를 아직 설정하지 않았습니다.<br>' +
      '<code style="font-size:11px; background:#f1f5f9; padding:2px 6px; border-radius:4px;">config.js</code>' +
      ' 파일의 WORKER_URL을 입력해 주세요.';
    return;
  }

  document.getElementById('loadingText').textContent =
    '물건 목록 불러오는 중... (잠시만 기다려 주세요)';

  try {
    let workerUrl = `${WORKER_URL.replace(/\/$/, '')}/?c=${encodeURIComponent(courtCode)}`;
    if (deptCode) workerUrl += `&d=${encodeURIComponent(deptCode)}`;
    console.log(`[두인경매] Worker 호출: ${workerUrl}`);

    const resp = await fetch(workerUrl);
    if (!resp.ok) throw new Error(`서버 오류 (${resp.status})`);

    const text = await resp.text();
    const parsed = parseResponse(text);
    const data = parsed.items;

    hide('loadingView');

    if (!data || data.length === 0) {
      show('emptyView');
      document.getElementById('emptyDesc').textContent =
        label + ' · ' + TODAY_LABEL;
      return;
    }

    allItems = data;
    renderStats(data, label);
    renderItems();

  } catch (err) {
    console.error('[두인경매] 데이터 로드 실패:', err.message);
    hide('loadingView');
    show('errorView');
    document.getElementById('errDesc').textContent =
      err.message + '\n잠시 후 다시 시도하거나 두인경매에 직접 방문해 주세요.';
  }
}

function parseResponse(text) {
  const trimmed = text.trim();
  const empty = { items: [], totalCnt: 0 };

  if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
    try {
      const json = JSON.parse(trimmed);
      if (Array.isArray(json)) return { items: json, totalCnt: json.length };
      const totalCnt = json.totalCnt != null ? Number(json.totalCnt) : null;
      if (json.item   && Array.isArray(json.item))   return { items: json.item, totalCnt };
      if (json.res    && Array.isArray(json.res))    return { items: json.res, totalCnt };
      if (json.list   && Array.isArray(json.list))   return { items: json.list, totalCnt };
      if (json.data   && Array.isArray(json.data))   return { items: json.data, totalCnt };
      if (json.items  && Array.isArray(json.items))  return { items: json.items, totalCnt };
      if (json.result && Array.isArray(json.result)) return { items: json.result, totalCnt };
      return { items: [json], totalCnt: 1 };
    } catch (_) {}
  }
  return empty;
}

function renderStats(items, label) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = '오늘 <strong>' + items.length + '건</strong>';
  bar.style.display = 'block';
}

function renderItems() {
  const container = document.getElementById('listView');
  const end       = Math.min(displayed + PAGE_SIZE, allItems.length);

  for (let i = displayed; i < end; i++) {
    container.appendChild(buildCard(allItems[i], i));
  }
  displayed = end;
  show('listView');

  const more = document.getElementById('loadMore');
  if (displayed < allItems.length) {
    more.style.display = 'block';
    more.textContent   = `더 보기 (${allItems.length - displayed}건 남음)`;
  } else {
    more.style.display = 'none';
  }
}

function loadMore() { renderItems(); }

function buildDetailPageUrl(tid) {
  let url = 'detail.html?tid=' + encodeURIComponent(tid) +
    '&c=' + encodeURIComponent(courtCode) +
    '&n=' + encodeURIComponent(courtLabel);
  if (deptCode) url += '&d=' + encodeURIComponent(deptCode);
  return url;
}

function cacheItemForDetail(item) {
  const tid = item.tid;
  if (!tid) return;
  const key = 'duin_item_' + tid;
  const raw = JSON.stringify(item);
  try {
    sessionStorage.setItem(key, raw);
    localStorage.setItem(key, raw);
  } catch (_) {}
}

function buildCard(item) {
  const caseNo  = stripHtml(item.saNo);
  const type    = item.ctgr    || '';
  const addr    = stripHtml(item.adrsInfo || item.regnAdrs) || '주소 정보 없음';
  const area    = stripHtml(item.areaInfo);
  const spl     = (item.splCdtn || '').trim();
  const apslAmt = num(item.apslAmt);
  const minbAmt = num(item.minbAmt);
  const bidDt   = item.bidDt   || '';
  const bidTm   = item.bidTm   || '';
  const stat    = stripHtml(item.statNm);
  const tid     = item.tid     || '';
  const mapAddr = stripHtml(item.regnAdrs || item.adrsInfo);
  const imgUrl  = imgFullUrl(item);

  const detailLink = tid
    ? buildDetailPageUrl(tid)
    : 'https://www.dooinauction.com/ca/caDtList.php';

  let statClass = 'status-기타';
  if (stat.includes('진행') || stat.includes('신건')) statClass = 'status-진행';
  else if (stat.includes('낙찰') || stat.includes('매각')) statClass = 'status-낙찰';
  else if (stat.includes('변경') || stat.includes('연기')) statClass = 'status-변경';

  const a = document.createElement('a');
  a.className = 'auction-item';
  a.href      = detailLink;
  if (tid) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      cacheItemForDetail(item);
      window.location.href = buildDetailPageUrl(tid);
    });
  }

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'item-thumb-wrap';
  if (imgUrl) {
    const img = document.createElement('img');
    img.className = 'item-thumb';
    img.src = imgUrl;
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.alt = '';
    img.onerror = function() {
      const ph = document.createElement('div');
      ph.className = 'item-thumb-placeholder';
      ph.textContent = '🏠';
      this.replaceWith(ph);
    };
    thumbWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'item-thumb-placeholder';
    ph.textContent = '🏠';
    thumbWrap.appendChild(ph);
  }

  const body = document.createElement('div');
  body.className = 'item-body';
  body.innerHTML = `
    ${type || stat ? `<div class="item-top">${stat ? `<span class="status-badge ${statClass}">${esc(stat)}</span>` : ''}</div>` : ''}
    ${type ? `<div class="item-type">${esc(type)}</div>` : ''}
    ${caseNo || mapAddr ? `
    <div class="item-case-row">
      ${caseNo ? `<span class="case-no-bold">${esc(caseNo)}</span>` : ''}
      ${mapAddr ? `<button type="button" class="map-btn">지도 보기</button>` : ''}
    </div>` : ''}
    <div class="item-addr">${esc(addr)}</div>
    ${area ? `<div class="item-area">${esc(area)}</div>` : ''}
    ${spl ? `<div class="item-spl">${esc(spl)}</div>` : ''}
    <div class="item-prices">
      <div class="price-block">
        <div class="price-label">감정가</div>
        <div class="price-val">${fmtAmt(apslAmt)}</div>
      </div>
      <div class="price-block">
        <div class="price-label">최저입찰가</div>
        <div class="price-val highlight">${fmtAmt(minbAmt)}</div>
      </div>
    </div>
    <div class="item-bottom">
      <div class="bid-time">입찰 <strong>${esc(bidDt)} ${esc(bidTm)}</strong></div>
      <div class="view-more">상세보기 →</div>
    </div>`;

  const mapBtn = body.querySelector('.map-btn');
  if (mapBtn && mapAddr) {
    mapBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      openKakaoMap(mapAddr);
    });
  }

  const row = document.createElement('div');
  row.className = 'item-row';
  row.appendChild(thumbWrap);
  row.appendChild(body);
  a.appendChild(row);

  return a;
}

function openKakaoMap(address) {
  if (!address) return;
  const url = 'https://map.daum.net/?q=' + encodeURIComponent(address);
  const h = Math.max(600, (screen.availHeight || 800) - 50);
  const win = window.open(
    url,
    'KakaoMap',
    'width=1200,height=' + h + ',top=0,left=10,scrollbars=yes,resizable=yes'
  );
  if (!win) {
    window.open(url, '_blank', 'noopener');
  }
}

function imgFullUrl(item) {
  const raw = (item.imgUrl || '').trim();
  if (!raw) return '';
  if (raw.startsWith('http')) return raw;
  return 'https://www.dooinauction.com' + raw;
}

function stripHtml(s) {
  return String(s || '')
    .replace(/<br\s*\/?>/gi, ' ')
    .replace(/<[^>]*>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}


function num(val) {
  if (val === null || val === undefined) return 0;
  return Number(String(val).replace(/[^0-9]/g, '')) || 0;
}

function fmtAmt(n) {
  if (!n || n === 0) return '-';
  if (n >= 100000000) {
    const eok = Math.floor(n / 100000000);
    const man = Math.floor((n % 100000000) / 10000);
    return man ? eok + '억 ' + man.toLocaleString() + '만' : eok + '억';
  }
  if (n >= 10000) return Math.floor(n / 10000).toLocaleString() + '만';
  return n.toLocaleString() + '원';
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showFlex(id) { document.getElementById(id).style.display = 'flex'; }
</script>
