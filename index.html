<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>두인경매 - 오늘의 경매물건</title>
  <style>
    :root {
      --red:    #e8310b;
      --gold:   #e8c56b;
      --bg:     #0d1b2a;
      --card:   #1a2e45;
      --border: rgba(255,255,255,0.08);
      --text:   #f1f5f9;
      --sub:    #94a3b8;
      --dim:    #334155;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                   'Noto Sans KR', '맑은 고딕', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .top-bar {
      background: #0a1520;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo-box {
      width: 32px; height: 32px;
      background: var(--red);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff; flex-shrink: 0;
    }

    .top-bar-info { flex: 1; min-width: 0; }
    .top-bar-name {
      font-size: 15px; font-weight: 800;
      color: var(--gold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .top-bar-date { font-size: 11px; color: var(--sub); margin-top: 1px; }

    .top-bar-link {
      font-size: 11px; color: var(--sub);
      text-decoration: none;
      border: 1px solid var(--dim);
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .top-bar-link:hover { border-color: var(--sub); color: var(--text); }

    /* ── 로딩 ── */
    #loadingView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 57px);
      gap: 16px;
      padding: 24px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; color: var(--sub); }

    /* ── 통계 바 ── */
    #statsBar {
      display: none;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--sub);
    }

    #statsBar strong { color: var(--gold); font-size: 16px; }

    /* ── 목록 ── */
    #listView { display: none; padding: 12px 12px 40px; }

    .auction-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
    }
    .auction-item:active { border-color: var(--gold); }

    .item-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .type-badge {
      background: rgba(232,49,11,0.15);
      border: 1px solid rgba(232,49,11,0.3);
      color: #f87171;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-진행 { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .status-낙찰 { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
    .status-변경 { background: rgba(234,179,8,0.15);  border: 1px solid rgba(234,179,8,0.3);  color: #fde047; }
    .status-기타 { background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.2);color: #94a3b8; }

    .case-no {
      font-size: 11px; color: var(--sub);
      margin-left: auto; flex-shrink: 0;
    }

    .item-addr {
      font-size: 13px; font-weight: 600; color: var(--text);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-prices {
      display: flex; gap: 12px;
      margin-bottom: 8px;
    }

    .price-block { flex: 1; }
    .price-label { font-size: 10px; color: var(--sub); margin-bottom: 2px; }
    .price-val   { font-size: 14px; font-weight: 700; color: var(--text); }
    .price-val.highlight { color: var(--gold); }

    .item-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .bid-time { font-size: 12px; color: var(--sub); }
    .bid-time strong { color: var(--text); }

    .view-more {
      font-size: 11px; color: var(--sub);
      display: flex; align-items: center; gap: 3px;
    }

    /* ── 빈 화면 ── */
    #emptyView {
      display: none;
      text-align: center;
      padding: 60px 24px;
      color: var(--sub);
    }
    #emptyView .empty-icon { font-size: 48px; margin-bottom: 12px; }
    #emptyView .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    #emptyView .empty-desc  { font-size: 13px; line-height: 1.6; }

    /* ── 오류 ── */
    #errorView {
      display: none;
      text-align: center;
      padding: 48px 24px;
    }
    #errorView .err-icon  { font-size: 44px; margin-bottom: 12px; }
    #errorView .err-title { font-size: 16px; font-weight: 700; color: #f87171; margin-bottom: 8px; }
    #errorView .err-desc  { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 20px; }

    .btn-red {
      display: inline-block;
      padding: 12px 24px;
      background: var(--red);
      color: #fff;
      font-size: 14px; font-weight: 700;
      border-radius: 10px;
      text-decoration: none;
    }

    /* ── 파라미터 없는 경우 ── */
    #noParamView {
      display: none;
      text-align: center;
      padding: 60px 24px;
    }
    #noParamView .np-icon  { font-size: 48px; margin-bottom: 14px; }
    #noParamView .np-title { font-size: 18px; font-weight: 800; color: #f87171; margin-bottom: 8px; }
    #noParamView .np-desc  { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 24px; }

    /* ── 더보기 ── */
    #loadMore {
      display: none;
      width: calc(100% - 24px);
      margin: 0 12px 20px;
      padding: 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--sub);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    #loadMore:hover { border-color: var(--sub); color: var(--text); }
  </style>
</head>
<body>

<!-- ★ Worker URL은 config.js 파일에서 관리합니다 ★ -->
<script src="config.js"></script>
<script>
  // config.js가 없거나 로드 실패 시 빈 문자열로 폴백
  const WORKER_URL = (window.DUIN_CONFIG && window.DUIN_CONFIG.WORKER_URL) || '';
</script>

<!-- 상단 바 -->
<div class="top-bar">
  <div class="logo-box">두</div>
  <div class="top-bar-info">
    <div class="top-bar-name" id="headerName">두인경매</div>
    <div class="top-bar-date" id="headerDate"></div>
  </div>
  <a class="top-bar-link" id="dooinLink"
     href="https://www.dooinauction.com/ca/caDtList.php" target="_blank">
    두인경매 ↗
  </a>
</div>

<!-- 로딩 -->
<div id="loadingView">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">경매물건 불러오는 중...</div>
</div>

<!-- 통계 -->
<div id="statsBar"></div>

<!-- 목록 -->
<div id="listView"></div>

<!-- 더보기 -->
<button id="loadMore" onclick="loadMore()">더 보기</button>

<!-- 빈 화면 -->
<div id="emptyView">
  <div class="empty-icon">📋</div>
  <div class="empty-title">오늘 경매물건이 없습니다</div>
  <div class="empty-desc" id="emptyDesc"></div>
</div>

<!-- 오류 -->
<div id="errorView">
  <div class="err-icon">⚠️</div>
  <div class="err-title" id="errTitle">데이터를 불러올 수 없습니다</div>
  <div class="err-desc" id="errDesc"></div>
  <a class="btn-red" href="https://www.dooinauction.com/ca/caDtList.php" target="_blank">
    두인경매 직접 방문하기
  </a>
</div>

<!-- 파라미터 없음 -->
<div id="noParamView">
  <div class="np-icon">⚠️</div>
  <div class="np-title">QR코드 정보가 없습니다</div>
  <div class="np-desc">
    올바른 QR코드를 스캔해 주세요.<br>
    두인경매 경매일정 페이지로 이동합니다.
  </div>
  <a class="btn-red" href="https://www.dooinauction.com/ca/caDtList.php" target="_blank">
    두인경매 경매일정 보기
  </a>
</div>

<script>
/* ═══════════════════════════════
   초기화
═══════════════════════════════ */
const DAYS = ['일','월','화','수','목','금','토'];
const now  = new Date();
const yyyy = now.getFullYear();
const mm   = String(now.getMonth()+1).padStart(2,'0');
const dd   = String(now.getDate()).padStart(2,'0');
const dayK = DAYS[now.getDay()];
const TODAY_LABEL = `${yyyy}년 ${Number(mm)}월 ${Number(dd)}일 (${dayK})`;
const TODAY_ISO   = `${yyyy}-${mm}-${dd}`;

document.getElementById('headerDate').textContent = TODAY_LABEL;

const sp = new URLSearchParams(window.location.search);
const courtCode = sp.get('c');
const deptCode  = sp.get('d'); /* 구버전 QR 호환용 (없으면 법원 전체) */
const nameRaw   = sp.get('n');

/* 파라미터 없으면 안내 화면 */
if (!courtCode) {
  console.warn('[두인경매] URL 파라미터 없음. 안내 화면 표시.');
  show('noParamView');
  hide('loadingView');
} else {
  console.log(`[두인경매] 초기화 시작 — 법원코드: ${courtCode}${deptCode ? ', 계코드: ' + deptCode : ' (법원 전체)'}`);
  init();
}

/* ═══════════════════════════════
   메인 흐름
═══════════════════════════════ */
let allItems  = [];
let displayed = 0;
const PAGE_SIZE = 20;

async function init() {
  /* 이름 표시 */
  const label = nameRaw ? decodeURIComponent(nameRaw) : '법원 경매물건';
  document.getElementById('headerName').textContent = label;
  document.title = label + ' · 오늘의 경매물건';

  /* Worker URL이 없으면 config.js 설정 안내 */
  if (!WORKER_URL) {
    console.error('[두인경매] WORKER_URL이 비어 있습니다. config.js를 확인해 주세요.');
    hide('loadingView');
    show('errorView');
    document.getElementById('errTitle').textContent = 'Worker 설정이 필요합니다';
    document.getElementById('errDesc').innerHTML =
      'Cloudflare Worker를 아직 설정하지 않았습니다.<br>' +
      '<code style="font-size:11px; background:#0d1b2a; padding:2px 6px; border-radius:4px;">' +
      'config.js</code> 파일의 <code style="font-size:11px; background:#0d1b2a; padding:2px 6px; border-radius:4px;">WORKER_URL</code>' +
      ' 을 입력해 주세요.';
    return;
  }

  document.getElementById('loadingText').textContent =
    label + ' 물건 불러오는 중... (건수가 많으면 잠시 걸릴 수 있습니다)';

  try {
    let workerUrl = `${WORKER_URL.replace(/\/$/, '')}/?c=${encodeURIComponent(courtCode)}`;
    if (deptCode) workerUrl += `&d=${encodeURIComponent(deptCode)}`;
    console.log(`[두인경매] Worker 호출: ${workerUrl}`);

    const resp = await fetch(workerUrl);
    console.log(`[두인경매] Worker 응답 상태: ${resp.status}`);

    if (!resp.ok) throw new Error(`서버 오류 (${resp.status})`);

    const text = await resp.text();
    const parsed = parseResponse(text);
    const data = parsed.items;
    const totalCnt = parsed.totalCnt;
    console.log(`[두인경매] 파싱 결과: ${data ? data.length : 0}건 (totalCnt=${totalCnt ?? '?'})`);

    hide('loadingView');

    if (!data || data.length === 0) {
      console.log('[두인경매] 오늘 경매물건 없음.');
      show('emptyView');
      document.getElementById('emptyDesc').textContent =
        label + ' · ' + TODAY_LABEL;
      return;
    }

    allItems = data;
    renderStats(data, label);
    renderItems();

  } catch (err) {
    console.error('[두인경매] 데이터 로드 실패:', err.message);
    hide('loadingView');
    show('errorView');
    document.getElementById('errDesc').textContent =
      err.message + '\n잠시 후 다시 시도하거나 두인경매에 직접 방문해 주세요.';
  }
}

/* ═══════════════════════════════
   응답 파싱 (JSON 대응)
═══════════════════════════════ */
function parseResponse(text) {
  const trimmed = text.trim();
  const empty = { items: [], totalCnt: 0 };

  /* JSON 시도 */
  if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
    try {
      const json = JSON.parse(trimmed);

      /* 배열 형태 */
      if (Array.isArray(json)) return { items: json, totalCnt: json.length };

      const totalCnt = json.totalCnt != null ? Number(json.totalCnt) : null;

      /* dooinauction.com: { item: [...], totalCnt: N } */
      if (json.item   && Array.isArray(json.item))   return { items: json.item, totalCnt };
      if (json.res    && Array.isArray(json.res))    return { items: json.res, totalCnt };
      if (json.list   && Array.isArray(json.list))   return { items: json.list, totalCnt };
      if (json.data   && Array.isArray(json.data))   return { items: json.data, totalCnt };
      if (json.items  && Array.isArray(json.items))  return { items: json.items, totalCnt };
      if (json.result && Array.isArray(json.result)) return { items: json.result, totalCnt };

      /* 단일 객체 */
      return { items: [json], totalCnt: 1 };
    } catch (_) {}
  }

  /* JSON 파싱 실패 → 빈 배열 (HTML 응답 등) */
  return empty;
}

/* ═══════════════════════════════
   통계 바
═══════════════════════════════ */
function renderStats(items, label) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML =
    '<strong>' + items.length + '건</strong> &nbsp;' + label + ' · ' + TODAY_LABEL;
  bar.style.display = 'block';
}

/* ═══════════════════════════════
   목록 렌더링
═══════════════════════════════ */
function renderItems() {
  const container = document.getElementById('listView');
  const end       = Math.min(displayed + PAGE_SIZE, allItems.length);

  for (let i = displayed; i < end; i++) {
    container.appendChild(buildCard(allItems[i], i));
  }
  displayed = end;

  show('listView');

  const more = document.getElementById('loadMore');
  if (displayed < allItems.length) {
    more.style.display = 'block';
    more.textContent   = `더 보기 (${allItems.length - displayed}건 남음)`;
  } else {
    more.style.display = 'none';
  }
}

function loadMore() {
  renderItems();
}

/* ═══════════════════════════════
   카드 생성
═══════════════════════════════ */
function buildCard(item, idx) {
  /* 필드 추출 - dooinauction.com 실제 응답 키 */
  const caseNo  = (item.saNo   || '').replace(/<[^>]*>/g, '').trim();
  const type    = item.ctgr    || '';
  const addr    = item.adrsInfo|| item.regnAdrs || '주소 정보 없음';
  const apslAmt = num(item.apslAmt);
  const minbAmt = num(item.minbAmt);
  const bidDt   = item.bidDt   || '';
  const bidTm   = item.bidTm   || '';
  const stat    = (item.statNm || '').replace(/<[^>]*>/g, '').trim();
  const tid     = item.tid     || '';

  /* 두인경매 상세 페이지 링크 */
  const detailLink = tid
    ? `https://www.dooinauction.com/ca/caDtView.php?tid=${tid}`
    : buildDetailLink(caseNo, '', '', item);

  /* 상태 배지 색 */
  let statClass = 'status-기타';
  if (stat.includes('진행') || stat.includes('신건')) statClass = 'status-진행';
  else if (stat.includes('낙찰') || stat.includes('매각'))     statClass = 'status-낙찰';
  else if (stat.includes('변경') || stat.includes('연기'))     statClass = 'status-변경';

  const a = document.createElement('a');
  a.className = 'auction-item';
  a.href      = detailLink;
  a.target    = '_blank';
  a.rel       = 'noopener';

  a.innerHTML = `
    <div class="item-top">
      ${type ? `<span class="type-badge">${esc(type)}</span>` : ''}
      ${stat ? `<span class="status-badge ${statClass}">${esc(stat)}</span>` : ''}
      ${caseNo ? `<span class="case-no">${esc(caseNo)}</span>` : ''}
    </div>
    <div class="item-addr">${esc(addr)}</div>
    <div class="item-prices">
      <div class="price-block">
        <div class="price-label">감정가</div>
        <div class="price-val">${fmtAmt(apslAmt)}</div>
      </div>
      <div class="price-block">
        <div class="price-label">최저입찰가</div>
        <div class="price-val highlight">${fmtAmt(minbAmt)}</div>
      </div>
    </div>
    <div class="item-bottom">
      <div class="bid-time">입찰: <strong>${esc(bidDt)} ${esc(bidTm)}</strong></div>
      <div class="view-more">상세보기 →</div>
    </div>`;

  return a;
}

/* ═══════════════════════════════
   상세 링크 생성
═══════════════════════════════ */
function buildDetailLink(caseNo, caseYear, caseSeq, item) {
  /* 사건번호 형식: "2024타경3887" → year=2024, seq=3887 */
  if (caseYear && caseSeq) {
    return `https://www.dooinauction.com/ca/caDtView.php?caseYear=${caseYear}&caseSeq=${caseSeq}`;
  }

  /* caseNo에서 연도/번호 추출 시도 */
  if (caseNo) {
    const m = String(caseNo).match(/(\d{4})[^\d]*(\d+)/);
    if (m) {
      return `https://www.dooinauction.com/ca/caDtView.php?caseYear=${m[1]}&caseSeq=${m[2]}`;
    }
  }

  /* fallback: 검색 페이지 */
  return 'https://www.dooinauction.com/ca/caDtList.php';
}

/* ═══════════════════════════════
   유틸
═══════════════════════════════ */
function v(obj, keys) {
  for (const k of keys) {
    if (obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  return null;
}

function num(val) {
  if (val === null || val === undefined) return 0;
  return Number(String(val).replace(/[^0-9]/g, '')) || 0;
}

function fmtAmt(n) {
  if (!n || n === 0) return '-';
  if (n >= 100000000) {
    const eok = Math.floor(n / 100000000);
    const man = Math.floor((n % 100000000) / 10000);
    return man ? eok + '억 ' + man.toLocaleString() + '만' : eok + '억';
  }
  if (n >= 10000) return Math.floor(n / 10000).toLocaleString() + '만';
  return n.toLocaleString() + '원';
}

/* 금액 문자열 → 숫자 ("142,000,000" → 142000000) */

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
